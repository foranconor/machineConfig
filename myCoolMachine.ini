[EMC]
VERSION                 = 1.1
MACHINE                 = myCoolMachine
DEBUG                   = 0

[DISPLAY]
DISPLAY                 = axis
CYCLE_TIME              = 0.100
POSITION_OFFSET         = MACHINE
POSITION_FEEDBACK       = ACTUAL
MAX_FEED_OVERRIDE       = 1.0
MAX_SPINDLE_OVERRIDE    = 1.0
PROGRAM_PREFIX          = /home/conor/linuxcnc/nc_files
INCREMENTS              = 1mm, 10mm, 100mm

[TASK]
TASK                    = milltask
CYCLE_TIME              = 0.001

[PYTHON]
TOPLEVEL                = python/toplevel.py
PATH_PREPEND            = python

[RS274NGC]
PARAMETER_FILE          = myCoolMachine.var
SUBROUTINE_PATH         = subroutines:state
USER_M_PATH             = mcodes
REMAP                   = M6 modalgroup=6 prolog=m6_prolog ngc=tool_change epilog=m6_epilog
STARTUP_CODE            = O<tool_restore> call

[EMCMOT]
EMCMOT                  = motmod
COMM_TIMEOUT            = 1.0
BASE_PERIOD             = 0
SERVO_PERIOD            = 1000000

[EMCIO]
EMCIO                   = io
CYCLE_TIME              = 0.100
TOOL_TABLE              = tools.tbl
TOOL_CHANGE_POSITION    = 0 0 50.8

[HAL]
HALFILE                 = ethercat_init.hal
HALFILE                 = core_sim.hal
HALFILE                 = sim_spindle_encoder.hal
HALFILE                 = simulated_home.hal
HALFILE                 = panic_controller.hal
HALFILE                 = ethercat.hal
HALFILE                 = myCoolMachine.hal
HALUI                   = halui
LCEC_CONFIG             = /home/conor/linuxcnc/configs/myCoolMachine/ethercat.xml

[TRAJ]
COORDINATES             = X Y Z
LINEAR_UNITS            = mm
ANGULAR_UNITS           = radian
DEFAULT_LINEAR_VELOCITY = 30.48
MAX_LINEAR_VELOCITY     = 200
DEFAULT_LINEAR_ACCELERATION = 508
MAX_LINEAR_ACCELERATION = 508
POSITION_FILE           = position_mm.txt

[KINS]
KINEMATICS              = trivkins
JOINTS                  = 3

[AXIS_X]
MAX_VELOCITY            = 100
MAX_ACCELERATION        = 508
MIN_LIMIT               = 0
MAX_LIMIT               = 6000

[AXIS_Y]
MAX_VELOCITY            = 100
MAX_ACCELERATION        = 508
MIN_LIMIT               = 0
MAX_LIMIT               = 800

[AXIS_Z]
MAX_VELOCITY            = 30.48
MAX_ACCELERATION        = 508
MIN_LIMIT               = -3
MAX_LIMIT               = 160

[JOINT_0]
TYPE                    = LINEAR
HOME                    = 0.000
MAX_VELOCITY            = 30.48
MAX_ACCELERATION        = 508
BACKLASH                = 0.000
INPUT_SCALE             = 838860.8
OUTPUT_SCALE            = 1.000
MIN_LIMIT               = -300
MAX_LIMIT               = 6300
FERROR                  = 1.27
MIN_FERROR              = .254
HOME_OFFSET             = 0.0
HOME_SEARCH_VEL         = 127
HOME_LATCH_VEL          = 25.4
HOME_USE_INDEX          = NO
HOME_IGNORE_LIMITS      = NO
HOME_SEQUENCE           = 1
HOME_IS_SHARED          = 1

[JOINT_1]
TYPE                    = LINEAR
HOME                    = 0.000
MAX_VELOCITY            = 30.48
MAX_ACCELERATION        = 508
BACKLASH                = 0.000
INPUT_SCALE             = 157.48
OUTPUT_SCALE            = 1.000
MIN_LIMIT               = -100
MAX_LIMIT               = 900
FERROR                  = 1.27
MIN_FERROR              = .254
HOME_OFFSET             = 0.0
HOME_SEARCH_VEL         = 127
HOME_LATCH_VEL          = 25.4
HOME_USE_INDEX          = NO
HOME_IGNORE_LIMITS      = NO
HOME_SEQUENCE           = 1

[JOINT_2]
TYPE                    = LINEAR
HOME                    = 0.0
MAX_VELOCITY            = 30.48
MAX_ACCELERATION        = 508
BACKLASH                = 0.000
INPUT_SCALE             = 157.48
OUTPUT_SCALE            = 1.000
MIN_LIMIT               = -10
MAX_LIMIT               = 190
FERROR                  = 1.27
MIN_FERROR              = .254
HOME_OFFSET             = 25.4
HOME_SEARCH_VEL         = 127
HOME_LATCH_VEL          = 25.4
HOME_USE_INDEX          = NO
HOME_IGNORE_LIMITS      = NO
HOME_SEQUENCE           = 0
HOME_IS_SHARED          = 1
